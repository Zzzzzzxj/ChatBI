<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatBI</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1f2933;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: #f5f7fa;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .service-state {
      color: #64748b;
      font-size: 13px;
      white-space: nowrap;
    }

    .query-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 18px;
    }

    input {
      min-width: 0;
      height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      color: #111827;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    input:disabled {
      background: #eef2f7;
      cursor: not-allowed;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #1d4ed8;
    }

    button:disabled {
      background: #9fb5de;
      cursor: default;
    }

    button.cancel {
      background: #b42318;
    }

    button.cancel:hover {
      background: #991b1b;
    }

    .history {
      display: grid;
      gap: 14px;
    }

    .empty-state {
      padding: 42px 0;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }

    .query-card {
      overflow: hidden;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .question-row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #edf2f7;
    }

    .question-mark {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: 999px;
      background: #e8f0fe;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 800;
    }

    .question-text {
      min-width: 0;
      color: #111827;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .question-time {
      color: #94a3b8;
      font-size: 12px;
      white-space: nowrap;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .sql-box {
      min-height: 70px;
      margin: 0;
      padding: 14px;
      overflow: auto;
      border-radius: 8px;
      background: #17212b;
      color: #dbeafe;
      font-family: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 17px;
      margin-left: 2px;
      background: #93c5fd;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .sql-tools {
      display: none;
      align-items: center;
      gap: 12px;
      margin: 10px 0 14px;
    }

    .copy-btn {
      height: 30px;
      border: 1px solid #cbd5e1;
      padding: 0 10px;
      background: #fff;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .copy-btn:hover {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .copy-btn.copied {
      border-color: #16a34a;
      color: #15803d;
    }

    .duration {
      margin-left: auto;
      color: #94a3b8;
      font-size: 12px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      color: #64748b;
      font-size: 13px;
    }

    .status.busy::before {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid #2563eb;
      border-top-color: transparent;
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e5edf4;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 750;
      white-space: nowrap;
    }

    tr:nth-child(even) td {
      background: #fbfdff;
    }

    .row-count {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 12px;
    }

    .empty-result {
      padding: 18px 0 2px;
      color: #64748b;
      font-size: 14px;
    }

    .error-box {
      margin-top: 4px;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      background: #fff1f0;
      color: #b42318;
      font-size: 14px;
      line-height: 1.5;
    }

    .error-type {
      margin-bottom: 4px;
      color: #991b1b;
      font-size: 12px;
      font-weight: 800;
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 24px, 1040px);
        padding-top: 20px;
      }

      header {
        display: grid;
        align-items: start;
      }

      .query-bar {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .question-row {
        grid-template-columns: 28px minmax(0, 1fr);
      }

      .question-mark {
        width: 28px;
        height: 28px;
      }

      .question-time {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ChatBI</h1>
      <div id="service-state" class="service-state">Ready</div>
    </header>

    <form id="query-form" class="query-bar">
      <input id="question" autocomplete="off" value="查询已完成订单的总数量">
      <button id="submit" type="submit">查询</button>
    </form>

    <section id="history" class="history">
      <div id="empty-state" class="empty-state">暂无查询记录</div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#query-form");
    const questionInput = document.querySelector("#question");
    const submitButton = document.querySelector("#submit");
    const serviceState = document.querySelector("#service-state");
    const historyNode = document.querySelector("#history");
    const emptyState = document.querySelector("#empty-state");

    let activeController = null;
    let activeRequest = false;

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (activeRequest) {
        cancelActiveRequest();
        return;
      }
      submitQuery();
    });

    async function submitQuery() {
      const question = questionInput.value.trim();
      if (!question) {
        questionInput.focus();
        return;
      }

      emptyState.hidden = true;
      setRunningState(true);

      const card = createQueryCard(question);
      historyNode.insertBefore(card.root, historyNode.firstChild);

      activeController = new AbortController();
      const startTime = performance.now();
      let sqlStartTime = startTime;
      let fullSql = "";

      try {
        const response = await fetch("/api/v1/query/stream", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({question}),
          signal: activeController.signal
        });

        if (!response.ok || !response.body) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, {stream: true});
          const events = buffer.split("\n\n");
          buffer = events.pop() || "";

          for (const rawEvent of events) {
            const parsedEvent = parseSseEvent(rawEvent);
            if (!parsedEvent) continue;

            const {eventType, payload} = parsedEvent;
            if (eventType === "sql_chunk") {
              if (!payload.content) continue;
              fullSql += payload.content;
              renderStreamingSql(card.sqlBox, card.cursor, fullSql);
            } else if (eventType === "sql_done") {
              fullSql = payload.sql || fullSql;
              card.sqlBox.textContent = fullSql;
              card.cursor.remove();
              card.sqlTools.style.display = "flex";
              card.duration.textContent = `SQL ${formatDuration(performance.now() - sqlStartTime)}`;
              bindCopyButton(card.copyButton, fullSql);
              updateStatus(card.status, "SQL 执行中", true);
            } else if (eventType === "result") {
              updateStatus(card.status, `完成 ${formatDuration(performance.now() - startTime)}`, false);
              renderResult(card.result, payload);
            } else if (eventType === "error") {
              card.cursor.remove();
              updateStatus(card.status, "", false);
              renderError(card.result, payload);
            }
          }
        }
      } catch (error) {
        card.cursor.remove();
        if (error.name === "AbortError") {
          updateStatus(card.status, "已取消", false);
        } else {
          updateStatus(card.status, "", false);
          renderError(card.result, {
            error: error.message,
            error_type: "network"
          });
        }
      } finally {
        setRunningState(false);
        activeController = null;
      }
    }

    function cancelActiveRequest() {
      if (activeController) {
        activeController.abort();
      }
    }

    function setRunningState(isRunning) {
      activeRequest = isRunning;
      questionInput.disabled = isRunning;
      submitButton.textContent = isRunning ? "取消" : "查询";
      submitButton.classList.toggle("cancel", isRunning);
      serviceState.textContent = isRunning ? "Running" : "Ready";
      if (!isRunning) {
        questionInput.focus();
      }
    }

    function createQueryCard(question) {
      const root = document.createElement("article");
      root.className = "query-card";

      const questionRow = document.createElement("div");
      questionRow.className = "question-row";

      const questionMark = document.createElement("div");
      questionMark.className = "question-mark";
      questionMark.textContent = "Q";

      const questionText = document.createElement("div");
      questionText.className = "question-text";
      questionText.textContent = question;

      const questionTime = document.createElement("div");
      questionTime.className = "question-time";
      questionTime.textContent = new Date().toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit"
      });

      questionRow.append(questionMark, questionText, questionTime);

      const body = document.createElement("div");
      body.className = "card-body";

      const sqlTitle = document.createElement("div");
      sqlTitle.className = "section-title";
      sqlTitle.textContent = "SQL";

      const sqlBox = document.createElement("pre");
      sqlBox.className = "sql-box";
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      sqlBox.appendChild(cursor);

      const sqlTools = document.createElement("div");
      sqlTools.className = "sql-tools";

      const copyButton = document.createElement("button");
      copyButton.type = "button";
      copyButton.className = "copy-btn";
      copyButton.textContent = "复制 SQL";

      const duration = document.createElement("span");
      duration.className = "duration";

      sqlTools.append(copyButton, duration);

      const status = document.createElement("div");
      status.className = "status busy";
      status.textContent = "SQL 生成中";

      const result = document.createElement("div");

      body.append(sqlTitle, sqlBox, sqlTools, status, result);
      root.append(questionRow, body);

      return {
        root,
        sqlBox,
        cursor,
        sqlTools,
        copyButton,
        duration,
        status,
        result
      };
    }

    function renderStreamingSql(sqlBox, cursor, sql) {
      sqlBox.textContent = sql;
      sqlBox.appendChild(cursor);
    }

    function parseSseEvent(rawEvent) {
      if (!rawEvent.trim()) return null;

      let eventType = "";
      const dataLines = [];

      for (const line of rawEvent.split("\n")) {
        if (line.startsWith("event:")) {
          eventType = line.slice(6).trim();
        } else if (line.startsWith("data:")) {
          dataLines.push(line.slice(5).trimStart());
        }
      }

      if (!eventType || !dataLines.length) return null;

      try {
        return {
          eventType,
          payload: JSON.parse(dataLines.join("\n"))
        };
      } catch (error) {
        return {
          eventType: "error",
          payload: {
            error: "响应数据解析失败",
            error_type: "client"
          }
        };
      }
    }

    function bindCopyButton(button, sql) {
      button.onclick = async () => {
        try {
          await navigator.clipboard.writeText(sql);
          button.textContent = "已复制";
          button.classList.add("copied");
          window.setTimeout(() => {
            button.textContent = "复制 SQL";
            button.classList.remove("copied");
          }, 1800);
        } catch (error) {
          button.textContent = "复制失败";
          window.setTimeout(() => {
            button.textContent = "复制 SQL";
          }, 1800);
        }
      };
    }

    function updateStatus(node, text, busy) {
      node.textContent = text;
      node.classList.toggle("busy", busy);
    }

    function renderResult(container, payload) {
      const columns = payload.columns || [];
      const rows = payload.rows || [];
      const rowCount = payload.row_count ?? rows.length;

      if (!rows.length) {
        container.innerHTML = '<div class="empty-result">查询完成，结果为空</div>';
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "result-wrapper";

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");

      for (const column of columns) {
        const th = document.createElement("th");
        th.textContent = column;
        headRow.appendChild(th);
      }
      thead.appendChild(headRow);

      const tbody = document.createElement("tbody");
      for (const row of rows) {
        const tr = document.createElement("tr");
        for (const column of columns) {
          const td = document.createElement("td");
          td.textContent = row[column] ?? "";
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }

      table.append(thead, tbody);
      wrapper.appendChild(table);

      const count = document.createElement("div");
      count.className = "row-count";
      count.textContent = `共 ${rowCount} 行`;

      container.replaceChildren(wrapper, count);
    }

    function renderError(container, payload) {
      const labels = {
        validation: "输入校验错误",
        llm: "模型调用失败",
        database: "SQL 执行错误",
        network: "网络请求错误",
        client: "页面解析错误"
      };

      const box = document.createElement("div");
      box.className = "error-box";

      const type = document.createElement("div");
      type.className = "error-type";
      type.textContent = labels[payload.error_type] || payload.error_type || "未知错误";

      const message = document.createElement("div");
      message.textContent = payload.error || "查询失败";

      box.append(type, message);
      container.replaceChildren(box);
    }

    function formatDuration(ms) {
      if (ms < 1000) return `${Math.round(ms)}ms`;
      return `${(ms / 1000).toFixed(1)}s`;
    }
  </script>
</body>
</html>
